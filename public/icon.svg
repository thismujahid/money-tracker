<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#182132" />
      <stop offset="100%" stop-color="#05070c" />
    </radialGradient>
    <!-- Gold Gradient for Book Cover and Coins -->
    <linearGradient id="gold-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <linearGradient id="gold-secondary" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>
    <linearGradient id="page-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
    </filter>
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Smooth Dark Radial Background -->
  <rect width="512" height="512" fill="url(#bg-grad)" rx="128" />
  
  <!-- Outer Glow Ring -->
  <rect x="12" y="12" width="488" height="488" rx="116" fill="none" stroke="url(#gold-primary)" stroke-width="4" opacity="0.2" />

  <!-- Main Ledger / Notebook Group -->
  <g transform="translate(100, 100)" filter="url(#shadow)">
    <!-- Ledger Book Cover (slightly rotated/tilted for dynamic feel) -->
    <rect x="20" y="30" width="260" height="280" rx="20" fill="url(#gold-secondary)" stroke="url(#gold-primary)" stroke-width="2" />
    
    <!-- Ledger Spiral Rings on the Right (Arabic notebook) -->
    <path d="M 280,60 C 295,60 295,75 280,75 M 280,110 C 295,110 295,125 280,125 M 280,160 C 295,160 295,175 280,175 M 280,210 C 295,210 295,225 280,225 M 280,260 C 295,260 295,275 280,275" 
          fill="none" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round" />

    <!-- Ledger Pages -->
    <rect x="40" y="40" width="230" height="260" rx="10" fill="url(#page-grad)" />

    <!-- Ruled Lines in the Ledger -->
    <line x1="65" y1="80" x2="225" y2="80" stroke="#cbd5e1" stroke-width="3" />
    <line x1="65" y1="120" x2="225" y2="120" stroke="#cbd5e1" stroke-width="3" />
    <line x1="65" y1="160" x2="225" y2="160" stroke="#cbd5e1" stroke-width="3" />
    <line x1="65" y1="200" x2="225" y2="200" stroke="#cbd5e1" stroke-width="3" />
    <line x1="65" y1="240" x2="225" y2="240" stroke="#cbd5e1" stroke-width="3" />

    <!-- Ledger content checkmark & stats (Financial indicators) -->
    <!-- Red/Orange minus symbol (expense check) -->
    <path d="M 75,120 L 95,100 M 75,100 L 95,120" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" />
    <!-- Green plus symbol (income check) -->
    <path d="M 75,160 L 95,160 M 85,150 L 85,170" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" />
    
    <!-- Pen laying on the notebook -->
    <g transform="translate(40, 20) rotate(-15)">
      <!-- Pen Body -->
      <rect x="0" y="0" width="12" height="180" rx="6" fill="#0f172a" stroke="url(#gold-primary)" stroke-width="2" />
      <!-- Pen Tip -->
      <path d="M 0,0 L 6,-15 L 12,0 Z" fill="url(#gold-primary)" />
      <!-- Pen Clip -->
      <rect x="-4" y="30" width="4" height="40" rx="2" fill="url(#gold-primary)" />
    </g>

    <!-- Floating Gold Coin in bottom-left corner -->
    <g transform="translate(20, 210) scale(1.1)" filter="url(#gold-glow)">
      <!-- Coin shadow -->
      <circle cx="20" cy="20" r="30" fill="#000" opacity="0.3" transform="translate(0, 4)" />
      <!-- Coin Body -->
      <circle cx="20" cy="20" r="30" fill="url(#gold-primary)" stroke="#78350f" stroke-width="2" />
      <!-- Coin Inner Detail -->
      <circle cx="20" cy="20" r="23" fill="none" stroke="#78350f" stroke-width="1" stroke-dasharray="4,3" />
      <text x="20" y="27" font-family="Cairo" font-size="22" font-weight="900" fill="#78350f" text-anchor="middle">ج</text>
    </g>
  </g>
</svg>
